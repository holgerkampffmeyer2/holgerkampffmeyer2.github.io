name: Weekly Mixcloud Update

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
        
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch latest Mixcloud data
        run: node scripts/fetch-mixcloud.mjs
        
      - name: Generate RSS feed
        run: node scripts/generate-rss.mjs
        
      - name: Run ESLint
        run: npm run lint
        
      - name: TypeScript check
        run: npm run check
        
      - name: Build Astro site
        run: npm run build
        
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
